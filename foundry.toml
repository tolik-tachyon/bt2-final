[profile.default]
src    = "src"
test   = "test"
script = "script"
out    = "out"
libs   = ["lib"]
via_ir = true

optimizer = true
optimizer_runs = 200

revert_strings = "strip"

ignored_error_codes = [
    5667
]
ignored_warnings_from = ["lib/"]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=lib/forge-std/src/",
    "@chainlink/=lib/chainlink-brownie-contracts/",
]

[lint]
exclude_lints = [
    "screaming-snake-case-immutable",
    "mixed-case-variable",
    "mixed-case-function",
    "screaming-snake-case-const",
]

[rpc_endpoints]
arbitrum = "https://arb-sepolia.g.alchemy.com/v2/IzAtqev4_-M9HvoOfwahZ"
