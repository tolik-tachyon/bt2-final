[profile.default]
src    = "src"
test   = "test"
script = "script"
out    = "out"
libs   = ["lib"]

optimizer = true
optimizer_runs = 200

ignored_warnings_from = ["lib/"]

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
sepolia = "https://eth-sepolia.g.alchemy.com/v2/lQnUnkuzwvejj3sFHfYJ5"
